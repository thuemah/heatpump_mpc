# Heat Pump MPC — OTC Offset Control Blueprint
#
# Home Assistant automation blueprint for heat pumps that do NOT allow
# direct LWT control — only an offset against the built-in weather-
# dependent (OTC / weather-compensated) heating curve.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HOW IT WORKS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# The MPC solver calculates an optimal absolute LWT (e.g. 32°C).
# Your heat pump's OTC curve also calculates a base LWT (e.g. 38°C).
# This blueprint computes the difference and writes it as an offset:
#
#   offset = MPC_target - pump_base_LWT
#   offset = 32 - 38 = -6°C → clamped to min_offset → -5°C
#
# The pump then runs at: OTC_base + offset = 38 + (-5) = 33°C
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LIMITATIONS — READ BEFORE USING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# This is a "nudge" mode, NOT full MPC control:
#
# 1. The pump's OTC curve remains in charge.  The MPC can shift the
#    curve up or down within the offset clamp range, but cannot
#    override it entirely.  If OTC says 40°C and offset range is
#    ±5°C, the pump will run between 35-45°C regardless of what the
#    MPC recommends.
#
# 2. Load-shifting is limited.  Full MPC can pre-charge a tank at
#    high LWT during cheap hours and coast during expensive ones.
#    With offset mode, the OTC base tracks outdoor temp in real-time
#    — you can't "pre-heat at +5 offset" because the pump will also
#    raise its base LWT when it gets cold.
#
# 3. The MPC cannot turn the pump off.  This blueprint only adjusts
#    the temperature offset — on/off control is still handled by
#    the pump's own thermostat logic.  The pump_on signal from MPC
#    is used to decide WHEN to recalculate, not to start/stop.
#
# 4. Offset range varies by manufacturer.  Daikin Altherma typically
#    allows -10 to +10°C.  Check YOUR unit's documentation.
#
# For full MPC control, use ESPAltherma (Modbus) with the direct
# LWT blueprint (pump_control_blueprint.yaml) instead.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# HARDWARE PROTECTION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# This blueprint includes compressor protection features:
#
# - Guard time: minimum interval between offset writes (default 30 min).
#   Prevents rapid cycling of the compressor.  Most inverter heat pumps
#   need 15-45 min to stabilise after a setpoint change.
#
# - Offset rounding: values are rounded to the configured step size
#   (default 1°C).  Many pumps only accept whole-degree offsets.
#
# - DHW pause: when the pump is in DHW mode, offset writes are blocked
#   to avoid interfering with the internal DHW cycle.
#
# - Defrost pause: offset writes are blocked during defrost cycles.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# COMPATIBLE SYSTEMS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Any heat pump that exposes:
#   - A sensor showing the current OTC-calculated base LWT
#   - A number entity for the LWT offset adjustment
#
# Known compatible:
#   - Daikin Altherma (via Daikin Residential Controller integration)
#   - Daikin via BRP069C41 cloud adapter
#   - Any pump with weather-compensated curve + offset control
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# INSTALLATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 1. Copy to config/blueprints/automation/heatpump_mpc/
# 2. Reload automations (or restart HA)
# 3. Create automation from this blueprint
# 4. Select your MPC and pump entities
# 5. Set offset clamps appropriate for your unit
# 6. Start conservative (±3°C) and widen once you trust the output
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

blueprint:
  name: "Heat Pump MPC — OTC Offset Control"
  description: >
    For heat pumps with weather-compensated (OTC) curves that only allow
    an offset adjustment, not direct LWT control.  Computes the difference
    between the MPC's optimal LWT and the pump's OTC base, clamps it to
    a safe range, and writes it as an offset.  Includes compressor guard
    time, DHW pause, defrost protection, and configurable rounding.
  domain: automation

  input:
    # ------------------------------------------------------------------
    # MPC entities (source — read from these)
    # ------------------------------------------------------------------
    mpc_lwt_setpoint:
      name: "MPC LWT Setpoint"
      description: >
        The MPC's recommended absolute flow temperature
        (e.g. number.heat_pump_mpc_lwt_setpoint).
      selector:
        entity:
          domain: number

    mpc_pump_on:
      name: "MPC Pump On sensor"
      description: >
        Used to recalculate the offset when the MPC schedule changes.
        The blueprint does NOT start/stop the pump — only adjusts offset.
      selector:
        entity:
          domain: binary_sensor

    # ------------------------------------------------------------------
    # Heat pump entities (target — write to these)
    # ------------------------------------------------------------------
    pump_base_lwt_sensor:
      name: "Pump OTC base LWT sensor"
      description: >
        Sensor showing the pump's current weather-compensated LWT before
        any offset is applied.  On Daikin Altherma this is typically
        sensor.xxx_leaving_water_temperature.
      selector:
        entity:
          domain: sensor

    pump_offset_entity:
      name: "Pump LWT offset control"
      description: >
        The number or climate entity that controls the LWT offset on
        your pump.  On Daikin Altherma via cloud adapter this is
        climate.xxx_leaving_water_offset; via Modbus it may be a
        number entity.
      selector:
        entity:
          domain:
            - number
            - climate

    # ------------------------------------------------------------------
    # Offset clamps & rounding
    # ------------------------------------------------------------------
    min_offset:
      name: "Minimum offset (°C)"
      description: >
        Most negative offset allowed.  -5°C is conservative.  Check your
        pump's documentation for the supported range (Daikin: -10 to +10).
      default: -5
      selector:
        number:
          min: -10
          max: 0
          step: 1
          unit_of_measurement: "°C"

    max_offset:
      name: "Maximum offset (°C)"
      description: >
        Most positive offset allowed.  +5°C is conservative.
      default: 5
      selector:
        number:
          min: 0
          max: 10
          step: 1
          unit_of_measurement: "°C"

    offset_step:
      name: "Offset step size (°C)"
      description: >
        Offsets are rounded to this increment before writing.  Most Daikin
        units accept only whole degrees (1.0).  Set to 0.5 if your pump
        supports half-degree steps.
      default: 1.0
      selector:
        number:
          min: 0.5
          max: 2.0
          step: 0.5
          unit_of_measurement: "°C"

    # ------------------------------------------------------------------
    # Compressor protection
    # ------------------------------------------------------------------
    guard_time_minutes:
      name: "Minimum time between offset writes (minutes)"
      description: >
        Prevents rapid setpoint changes that stress the compressor.
        30 minutes is safe for most inverter pumps.  Increase to 45
        for older or non-inverter units.
      default: 30
      selector:
        number:
          min: 5
          max: 60
          step: 5
          unit_of_measurement: "min"

    # ------------------------------------------------------------------
    # DHW pause
    # ------------------------------------------------------------------
    dhw_active_sensor:
      name: "DHW active sensor (optional)"
      description: >
        A binary sensor or the MPC's DHW mode sensor that reads 'on'
        when the pump is running a DHW cycle.  Offset writes are paused
        during DHW to avoid interfering with the pump's internal DHW
        logic.  Leave empty if your pump does not signal DHW mode.
      default: ""
      selector:
        entity:
          domain: binary_sensor

    # ------------------------------------------------------------------
    # Defrost protection
    # ------------------------------------------------------------------
    defrost_sensor:
      name: "Defrost binary sensor (optional)"
      description: >
        Pauses offset writes during defrost.  Leave empty if not available.
      default: ""
      selector:
        entity:
          domain: binary_sensor

# ======================================================================
# Triggers
# ======================================================================
trigger:
  # MPC updated its recommended LWT
  - platform: state
    entity_id: !input mpc_lwt_setpoint
    id: mpc_lwt_changed

  # Pump's OTC base LWT changed (outdoor temp shifted the curve)
  - platform: state
    entity_id: !input pump_base_lwt_sensor
    id: pump_base_changed

  # MPC schedule changed (pump_on transition)
  - platform: state
    entity_id: !input mpc_pump_on
    id: pump_state_changed

# ======================================================================
# Conditions: none at top level — guards are in the action block
# ======================================================================
condition: []

# ======================================================================
# Action: guard → compute → round → clamp → write if changed
# ======================================================================
action:
  - variables:
      defrost_sensor_id: !input defrost_sensor
      dhw_sensor_id: !input dhw_active_sensor
      mpc_lwt_entity: !input mpc_lwt_setpoint
      base_lwt_entity: !input pump_base_lwt_sensor
      offset_entity: !input pump_offset_entity
      clamp_min: !input min_offset
      clamp_max: !input max_offset
      step: !input offset_step
      guard_minutes: !input guard_time_minutes

  # --- Defrost guard: block all writes during defrost ---
  - condition: template
    value_template: >
      {% if defrost_sensor_id %}
        {{ states(defrost_sensor_id) != 'on' }}
      {% else %}
        {{ true }}
      {% endif %}

  # --- DHW guard: block writes during DHW cycle ---
  - condition: template
    value_template: >
      {% if dhw_sensor_id %}
        {{ states(dhw_sensor_id) != 'on' }}
      {% else %}
        {{ true }}
      {% endif %}

  # --- Guard time: minimum interval between writes ---
  - condition: template
    value_template: >
      {% set last = states[offset_entity].last_changed %}
      {% if last %}
        {{ (now() - last).total_seconds() > (guard_minutes * 60) }}
      {% else %}
        {{ true }}
      {% endif %}

  # --- Compute offset ---
  - variables:
      mpc_target: "{{ states(mpc_lwt_entity) | float(0) }}"
      pump_base: "{{ states(base_lwt_entity) | float(0) }}"

  # --- Skip if MPC or pump data is missing ---
  - condition: template
    value_template: "{{ mpc_target > 0 and pump_base > 0 }}"

  - variables:
      raw_offset: "{{ mpc_target - pump_base }}"
      # Round to step size, then clamp to [min, max]
      rounded_offset: "{{ (raw_offset / step) | round(0) * step }}"
      clamped_offset: "{{ [clamp_min, [rounded_offset, clamp_max] | min] | max }}"
      current_offset: >
        {% if offset_entity.startswith('climate.') %}
          {{ state_attr(offset_entity, 'temperature') | float(0) }}
        {% else %}
          {{ states(offset_entity) | float(0) }}
        {% endif %}

  # --- Only write if offset actually changed ---
  - condition: template
    value_template: "{{ (clamped_offset - current_offset) | abs >= (step * 0.9) }}"

  - service: >
      {% if offset_entity.startswith('climate.') %}
        climate.set_temperature
      {% else %}
        number.set_value
      {% endif %}
    target:
      entity_id: !input pump_offset_entity
    data: >
      {% if offset_entity.startswith('climate.') %}
        {{ {"temperature": clamped_offset} }}
      {% else %}
        {{ {"value": clamped_offset} }}
      {% endif %}

mode: single
max_exceeded: silent
